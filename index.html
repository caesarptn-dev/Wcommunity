<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wcommunity — Share Anything</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel (transforms JSX in the browser) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body,#root{min-height:100%}
  body{background:#0e0f11;color:#e8e9eb;font-family:'DM Sans',sans-serif}
  #loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
  #loading .spin{width:36px;height:36px;border:3px solid #2a2d35;border-top-color:#3b82f6;border-radius:50%;animation:sp .7s linear infinite}
  #loading p{color:#4a4f5a;font-size:14px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root">
  <div id="loading">
    <div class="spin"></div>
    <p>Loading Wcommunity…</p>
  </div>
</div>
<!-- Load the JSX app file -->
<script type="text/babel" src="wcommunity.jsx" data-type="module"></script>
</body>
</html>
